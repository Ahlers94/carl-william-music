---
layout: default
title: "Web MPC Sampler | Carl William Music"
description: "Custom web-based 4x4 pad sampler and loop tool."
extra_js:
  - /assets/js/mpc.js
nav: sampler
---

<main class="content-page narrow">
  
  <div class="section-label">Live Sampler</div>
  
  <!-- ── DAW / MPC CLONE ──────────────────────────────────────── -->
  <div class="daw-interface tab-fade">
    
    <!-- Status Screen -->
    <header class="status-screen">
      <div class="section-label">System Dashboard</div>
      <div class="lcd-panel">
        <span id="tempo-display">120 BPM</span>
        <span id="filter-display">8000 Hz</span>
        <span id="midi-status" class="blink">MIDI: WAIT</span>
      </div>
      <!-- Fixed canvas coordinates matching standard resolution mapping -->
      <canvas id="step-progress" width="400" height="10"></canvas>
    </header>

    <!-- Transport Bar -->
    <nav class="transport-bar">
      <!-- Added standard semantic role tracking buttons for accessibility engines -->
      <button id="btn-rec" class="transport-btn stop-propagation" aria-label="Record Toggle">REC</button>
      <button id="btn-stop" class="transport-btn stop-propagation" aria-label="Stop Playback">STOP</button>
      <button id="btn-play" class="transport-btn stop-propagation" aria-label="Start Playback">PLAY</button>
    </nav>

    <!-- 4x4 Pad Matrix -->
 <section class="pad-grid" role="region" aria-label="MPC Pad Grid">
  {% for pad in site.data.daw.pads %}
    <button class="mpc-pad" 
            data-pad-id="{{ pad.id }}" 
            data-note="{{ pad.note }}" 
            data-type="one-shot">
      <span class="pad-label">{{ pad.label }}</span>
    </button>
  {% endfor %}
</section>

  </div>
</main>
