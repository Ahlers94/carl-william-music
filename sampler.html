---
layout: default
title: "Web MPC Sampler | Carl William Music"
description: "Custom web-based 4x4 pad sampler and loop tool."
extra_js:
  - /assets/js/mpc.js
---

<main class="content-page narrow">
  
  <div class="section-label">Live Sampler</div>
  
  <!-- ── DAW / MPC CLONE ──────────────────────────────────────── -->
  <div class="daw-interface tab-fade">
    
    <!-- Status Screen -->
    <header class="status-screen">
      <div class="section-label">System Dashboard</div>
      <div class="lcd-panel">
        <span id="tempo-display">120 BPM</span>
        <span id="filter-display">8000 Hz</span>
        <span id="midi-status" class="blink">MIDI: WAIT</span>
      </div>
      <!-- Fixed canvas coordinates matching standard resolution mapping -->
      <canvas id="step-progress" width="400" height="10"></canvas>
    </header>

    <!-- Transport Bar -->
    <nav class="transport-bar">
      <!-- Added standard semantic role tracking buttons for accessibility engines -->
      <button id="btn-rec" class="transport-btn stop-propagation" aria-label="Record Toggle">REC</button>
      <button id="btn-stop" class="transport-btn stop-propagation" aria-label="Stop Playback">STOP</button>
      <button id="btn-play" class="transport-btn stop-propagation" aria-label="Start Playback">PLAY</button>
    </nav>

    <!-- 4x4 Pad Matrix -->
    <section class="pad-grid" role="region" aria-label="MPC Pad Grid">
      <!-- Standardized data keys for streamlined Web Audio and Web MIDI lookup -->
      <button class="mpc-pad" data-pad-id="1" data-note="36" data-type="one-shot"><span class="pad-label">KICK</span></button>
      <button class="mpc-pad" data-pad-id="2" data-note="38" data-type="one-shot"><span class="pad-label">SNARE</span></button>
      <button class="mpc-pad" data-pad-id="3" data-note="42" data-type="one-shot"><span class="pad-label">CH HAT</span></button>
      <button class="mpc-pad" data-pad-id="4" data-note="46" data-type="one-shot"><span class="pad-label">OH HAT</span></button>
      
      <button class="mpc-pad" data-pad-id="5" data-note="48" data-type="one-shot"><span class="pad-label">TOM 1</span></button>
      <button class="mpc-pad" data-pad-id="6" data-note="45" data-type="one-shot"><span class="pad-label">TOM 2</span></button>
      <button class="mpc-pad" data-pad-id="7" data-note="41" data-type="one-shot"><span class="pad-label">TOM 3</span></button>
      <button class="mpc-pad" data-pad-id="8" data-note="49" data-type="one-shot"><span class="pad-label">CRASH</span></button>
      
      <button class="mpc-pad" data-pad-id="9" data-note="51" data-type="one-shot"><span class="pad-label">RIDE</span></button>
      <button class="mpc-pad" data-pad-id="10" data-note="60" data-type="sample"><span class="pad-label">SAMP 1</span></button>
      <button class="mpc-pad" data-pad-id="11" data-note="62" data-type="sample"><span class="pad-label">SAMP 2</span></button>
      <button class="mpc-pad" data-pad-id="12" data-note="64" data-type="sample"><span class="pad-label">SAMP 3</span></button>
      
      <button class="mpc-pad" data-pad-id="13" data-note="65" data-type="loop"><span class="pad-label">LOOP A</span></button>
      <button class="mpc-pad" data-pad-id="14" data-note="67" data-type="loop"><span class="pad-label">LOOP B</span></button>
      <button class="mpc-pad" data-pad-id="15" data-note="69" data-type="fx"><span class="pad-label">FX 1</span></button>
      <button class="mpc-pad" data-pad-id="16" data-note="71" data-type="fx"><span class="pad-label">FX 2</span></button>
    </section>

  </div>
</main>
