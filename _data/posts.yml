# POSTS / NEWS DATA FILE
# ─────────────────────────────────────────────────────────────────
# Each entry is one blog post displayed in the News tab.
#
# REQUIRED fields:
#   title:  Short headline for the post
#   date:   Display date -- any format works (e.g. "2025-05-18" or "May 18, 2025")
#   body:   Your text in double quotes on one line.
#           Avoid smart quotes and em dashes; use -- instead of a dash.
#
# OPTIONAL fields:
#   tag:      One of: show | release | update | gear
#   venue:    Venue name and/or address (show recaps)
#   gear:     List of gear items used (show recaps)
#   setlist:  Ordered list of songs played (show recaps)
#   video_id: YouTube video ID (the part after watch?v=) -- embeds below the post
#
# ── ORDER: newest entry at the TOP of this file ──────────────────

- title: "Debut at Tanner Brewing"
  date: "12-27-2025"
  tag: show
  body: "First gig at Tanner Brewing Company, Haddon Heights, NJ. Played two 1-hour sets. Gig was short notice -- got the offer at 1:30PM, showtime 7PM. Made up a social media post by 2PM and blasted out notifications. Good crowd, about a dozen people showed up on a Saturday night in the snow. Unfortunately forgot to hit record for one set."
  venue: "Tanner Brewing Company, Haddon Heights NJ"
  gear:
    - Taylor Baby tuned down a whole step
    - Carlo Robelli Electric (standard tuning)
    - Line 6 DL4
    - 2 Boss BCB-20 boards powered by 1x 18650 cell with buck booster to 9V
    - Boss TU-2, NS-2, CS-3, OD-2, OC-3, CH-1, RC-2
    - Casio VL-1

