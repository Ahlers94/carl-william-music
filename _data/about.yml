bio: |
  Musicians aren't duplicating my rig for a straightforward reason: 
  putting it together requires skills across three distinct technical disciplines.

  To build what I have, a person must simultaneously act as an audio engineer to make the music, 
  a hardware systems builder to make the rig, and a software developer to make this website. 

  The vast majority of guitarists want plug-and-play simplicity. I want to explore sonic possibilities.
