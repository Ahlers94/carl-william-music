bio: |

Most modern music workflows sell a promise: frictionless and ready to plug-and-play out of the box. For me, frictionless is just another word for limited. True creative agency starts where the manual ends.

I reject the separation of disciplines that defines modern music-making. To get the sounds I hear in my head, I have to be more than just a musician; I have to be the systems architect of my own environment, operating simultaneously across three disciplines.

- **The Audio Engineer** shapes what comprises the overall sound: harmonic structure, effects, texture, and tone.
- **The Hardware Builder** constructs the chassis by modifying circuitry and fusing legacy components with modern tech to build instruments that don't exist off any shelf.
- **The Software Developer** writes the code for the web-based instruments, the recordings, and the virtual pedalboards. This website is the digital archive that houses all of it.

This is sonic depth pursued the hard way. By working inside strict, self-imposed limits, I strip out the digital choice paralysis that plagues modern production and become master of my own domain. I want to understand the waveform, the voltage, and the code that brings a sound into existence and not just the preset that fakes it.

This website is the archive of that intersection: the intentional, the modified, and the constructed.

I don't make music to fit a template. I build the instruments that let me ignore the template entirely, and when the systems I build fail or surprise me, that's where the music actually comes from.



