<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Casio VL-Tone VL-1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --chassis: #d8d4cc;
    --chassis-dark: #b8b4ac;
    --stripe: #3a3835;
    --lcd-bg: #8aaa7a;
    --lcd-text: #1e2e18;
    --key-white: #f5f3ee;
    --key-black: #2a2825;
    --key-border: #aaa89f;
    --btn-bg: #c8c4bc;
    --btn-active: #e8e400;
    --accent: #c8200c;
    --screw: #888;
    --label: #3a3835;
  }

  body {
    background: #1a1a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    font-family: Arial, sans-serif;
  }

  /* ── CHASSIS ── */
  #vl1 {
    width: min(812px, 100%);
    background: var(--chassis);
    border-radius: 10px 10px 6px 6px;
    box-shadow:
      0 20px 60px rgba(0,0,0,.7),
      inset 0 1px 0 #f0ede6,
      inset 0 -2px 0 #a09c94;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* top stripe */
  .top-stripe {
    height: 14px;
    background: linear-gradient(180deg, #444 0%, #222 100%);
    border-radius: 10px 10px 0 0;
  }

  /* ── PANEL ── */
  .panel {
    padding: 12px 18px 10px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: start;
  }

  /* Branding */
  .branding {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-casio {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(13px, 2.2vw, 20px);
    font-weight: 700;
    letter-spacing: 3px;
    color: #1a1a18;
  }
  .brand-vltone {
    font-size: clamp(8px, 1.2vw, 11px);
    letter-spacing: 2px;
    color: #555;
    margin-top: 2px;
  }
  .brand-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: clamp(7px, 1vw, 9px);
    font-weight: bold;
    letter-spacing: 1px;
    padding: 1px 5px;
    border-radius: 2px;
    margin-top: 4px;
    width: fit-content;
  }

  /* ── CENTER CONTROLS ── */
  .center-controls {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* control modules */
  .ctrl-module {
    background: #c8c4bb;
    border-radius: 4px;
    padding: 6px 8px 5px;
    border: 1px solid #aaa8a0;
    box-shadow: inset 0 1px 0 #ddd9d0, 0 1px 2px rgba(0,0,0,.2);
  }
  .ctrl-module label {
    display: block;
    font-size: 8px;
    font-weight: bold;
    letter-spacing: 0.8px;
    color: var(--label);
    text-align: center;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  /* voice selector */
  .voice-grid {
    display: flex;
    gap: 4px;
  }
  .voice-btn {
    cursor: pointer;
    background: var(--btn-bg);
    border: 1px solid #999;
    border-radius: 3px;
    padding: 4px 0;
    width: clamp(42px, 8vw, 58px);
    font-size: clamp(7px, 1.1vw, 9px);
    font-weight: bold;
    letter-spacing: 0.5px;
    color: var(--label);
    text-align: center;
    box-shadow: inset 0 1px 0 #ddd, 0 2px 0 #888;
    transition: background .1s, box-shadow .05s, transform .05s;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .voice-btn:active, .voice-btn.active {
    background: var(--btn-active);
    color: #222;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.3), 0 0px 0 #888;
    transform: translateY(1px);
  }
  .voice-btn .v-icon { font-size: 11px; display: block; }

  /* sample selector under each voice */
  .sample-select {
    width: 100%;
    font-size: 7px;
    background: #1a1a18;
    color: #8aaa7a;
    border: 1px solid #555;
    border-radius: 2px;
    padding: 1px 2px;
    margin-top: 3px;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
  }

  /* Sliders */
  .slider-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  input[type=range].vl-slider {
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 14px;
    height: 60px;
    background: #888;
    border-radius: 3px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
    cursor: pointer;
  }
  input[type=range].vl-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 14px;
    background: #f0ede6;
    border: 2px solid #444;
    border-radius: 2px;
    cursor: pointer;
    box-shadow: 0 2px 4px rgba(0,0,0,.3);
  }
  input[type=range].vl-slider::-moz-range-thumb {
    width: 20px;
    height: 14px;
    background: #f0ede6;
    border: 2px solid #444;
    border-radius: 2px;
    cursor: pointer;
    box-shadow: 0 2px 4px rgba(0,0,0,.3);
  }

  /* octave switch */
  .oct-switch {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .oct-btn {
    cursor: pointer;
    background: var(--btn-bg);
    border: 1px solid #999;
    border-radius: 3px;
    padding: 3px 8px;
    font-size: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
    color: var(--label);
    text-align: center;
    box-shadow: inset 0 1px 0 #ddd, 0 2px 0 #888;
    transition: background .1s, box-shadow .05s, transform .05s;
    min-width: 36px;
  }
  .oct-btn:active, .oct-btn.active {
    background: var(--btn-active);
    color: #222;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.3), 0 0px 0 #888;
    transform: translateY(1px);
  }

  /* ── LCD ── */
  .lcd-panel {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }
  .lcd {
    background: var(--lcd-bg);
    border: 2px solid #2a3a22;
    border-radius: 3px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.35), 0 1px 0 #fff2;
    padding: 4px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: bold;
    color: var(--lcd-text);
    letter-spacing: 3px;
    min-width: 110px;
    text-align: center;
    white-space: nowrap;
  }
  .octave-indicator {
    font-size: 8px;
    font-weight: bold;
    color: #555;
    letter-spacing: 1px;
    text-align: right;
  }

  /* screws */
  .screw {
    width: 8px; height: 8px;
    background: radial-gradient(circle at 35% 35%, #bbb, #888);
    border-radius: 50%;
    position: absolute;
  }
  .screw::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 70%; height: 1.5px;
    background: #555;
    transform: translate(-50%,-50%) rotate(45deg);
  }

  /* ── KEYBOARD SECTION ── */
  .keyboard-section {
    background: #c8c4bc;
    border-top: 2px solid #aaa9a0;
    padding: 8px 12px 0;
  }

  .keyboard-outer {
    background: #1a1a18;
    border-radius: 4px 4px 0 0;
    padding: 8px 6px 0;
    box-shadow: inset 0 4px 8px rgba(0,0,0,.5);
    overflow: visible;
  }

  .keybed {
    position: relative;
    display: flex;
    height: clamp(110px, 22vw, 165px);
    width: 100%;
  }

  /* White keys container */
  .white-keys {
    display: flex;
    width: 100%;
    height: 100%;
    gap: 1px;
  }

  .wkey {
    flex: 1;
    background: var(--key-white);
    border: 1px solid var(--key-border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    position: relative;
    box-shadow: inset 0 -4px 0 #ccc9c0, 0 2px 3px rgba(0,0,0,.15);
    transition: background .05s;
    -webkit-tap-highlight-color: transparent;
  }
  .wkey.pressed {
    background: #e8e5de;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.15), inset 0 -1px 0 #bbb;
  }
  
  /* Black keys overlay */
  .black-keys {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 62%;
    pointer-events: none;
  }

  .bkey {
    position: absolute;
    height: 100%;
    background: var(--key-black);
    border-radius: 0 0 3px 3px;
    cursor: pointer;
    pointer-events: all;
    box-shadow: inset 0 -3px 0 #111, 0 3px 4px rgba(0,0,0,.5);
    transition: background .05s;
    -webkit-tap-highlight-color: transparent;
  }
  .bkey.pressed {
    background: #111;
    box-shadow: inset 0 2px 3px rgba(0,0,0,.5);
  }

  /* Desktop key labels */
  .note-label {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(6px, 1.2vw, 10px);
    font-family: Arial, sans-serif;
    font-weight: bold;
    pointer-events: none;
  }
  
  .wkey .note-label {
    color: #111;
  }

  .bkey .note-label {
    color: #eee;
  }

  /* Hide labels on mobile/smaller screens */
  @media (max-width: 768px) {
    .note-label { display: none !important; }
  }

  /* Pedal/rhythm strip */
  .bottom-strip {
    background: var(--stripe);
    height: 10px;
    border-radius: 0 0 6px 6px;
  }

  /* ── CONFIG PANEL (collapsible) ── */
  .config-panel {
    background: #1e1e1c;
    border-radius: 6px;
    margin-top: 12px;
    width: min(812px, 100%);
    overflow: hidden;
  }
  .config-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    cursor: pointer;
    color: #8aaa7a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .config-toggle:hover { background: #252523; }
  .config-body {
    display: none;
    padding: 12px 14px;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .config-body.open { display: grid; }

  .cfg-voice {
    background: #2a2a28;
    border-radius: 4px;
    padding: 8px;
    border: 1px solid #3a3a38;
  }
  .cfg-voice-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #8aaa7a;
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .cfg-select {
    width: 100%;
    background: #1a1a18;
    color: #c8c4bc;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 3px 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    cursor: pointer;
  }

  /* mobile tweaks */
  @media (max-width: 500px) {
    .voice-btn { padding: 3px 0; }
    .panel { grid-template-columns: auto 1fr; }
    .lcd-panel { display: none; }
  }
</style>
</head>

<div id="vl1">
  <div class="top-stripe"></div>

  <div class="screw" style="top:20px;left:10px"></div>
  <div class="screw" style="top:20px;right:10px"></div>

  <div class="panel">
    <div class="branding">
      <span class="brand-casio">CASIO</span>
      <span class="brand-vltone">VL-TONE</span>
      <span class="brand-badge">VL-1</span>
    </div>

    <div class="center-controls">

      <div class="ctrl-module">
        <label>Voice Select</label>
        <div class="voice-grid" id="voiceGrid">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <button class="voice-btn active" data-voice="0"><span class="v-icon">🎹</span>PIANO</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <button class="voice-btn" data-voice="1"><span class="v-icon">✨</span>FANTSAY</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <button class="voice-btn" data-voice="2"><span class="v-icon">🎻</span>VIOLIN</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <button class="voice-btn" data-voice="3"><span class="v-icon">🎵</span>FLUTE</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <button class="voice-btn" data-voice="4"><span class="v-icon">🎸</span>GUITAR</button>
          </div>
        </div>
      </div>

      <div class="ctrl-module">
        <label>Volume</label>
        <div class="slider-row">
          <input type="range" class="vl-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
      </div>

      <div class="ctrl-module">
        <label>Octave</label>
        <div class="oct-switch">
          <button class="oct-btn" data-oct="-1">LOW</button>
          <button class="oct-btn active" data-oct="0">MID</button>
          <button class="oct-btn" data-oct="1">HIGH</button>
        </div>
      </div>

    </div>

    <div class="lcd-panel">
      <div class="lcd" id="lcd">PIANO</div>
      <div class="octave-indicator" id="octLabel">OCT: MID</div>
    </div>
  </div>

  <div class="keyboard-section">
    <div class="keyboard-outer">
      <div class="keybed" id="keybed">
        <div class="white-keys" id="whiteKeys"></div>
        <div class="black-keys" id="blackKeys"></div>
      </div>
    </div>
  </div>

  <div class="bottom-strip"></div>
</div>

<div class="config-panel">
  <div class="config-toggle" id="configToggle">
    <span>⚙ SAMPLE CONFIGURATION</span>
    <span id="configArrow">▼</span>
  </div>
  <div class="config-body" id="configBody">
    </div>
</div>

    { path: 'Samples/50099000_DI_53.wav', root: 53, lo: 51, hi: 56 },
    { path: 'Samples/50099000_DI_31.wav', root: 31, lo: 12, hi: 33 },
    { path: 'Samples/50099000_DI_36.wav', root: 36, lo: 34, hi: 38 },
    { path: 'Samples/50099000_DI_65.wav', root: 65, lo: 63, hi: 68 },
    { path: 'Samples/50099000_DI_48.wav', root: 48, lo: 45, hi: 50 },
    { path: 'Samples/50099000_DI_77.wav', root: 77, lo: 75, hi: 84 },
    { path: 'Samples/50099000_DI_41.wav', root: 41, lo: 39, hi: 44 },
    { path: 'Samples/50099000_DI_72.wav', root: 72, lo: 69, hi: 74 },
    { path: 'Samples/50099000_DI_60.wav', root: 60, lo: 57, hi: 62 },
  ],
  'English Horn (Wave 6)': [
    { path: 'Samples/60099000_DI_36.wav', root: 36, lo: 34, hi: 38 },
    { path: 'Samples/60099000_DI_31.wav', root: 31, lo: 12, hi: 33 },
    { path: 'Samples/60099000_DI_65.wav', root: 65, lo: 63, hi: 68 },
    { path: 'Samples/60099000_DI_72.wav', root: 72, lo: 69, hi: 74 },
    { path: 'Samples/60099000_DI_60.wav', root: 60, lo: 57, hi: 62 },
    { path: 'Samples/60099000_DI_53.wav', root: 53, lo: 51, hi: 56 },
    { path: 'Samples/60099000_DI_77.wav', root: 77, lo: 75, hi: 84 },
    { path: 'Samples/60099000_DI_41.wav', root: 41, lo: 39, hi: 44 },
    { path: 'Samples/60099000_DI_48.wav', root: 48, lo: 45, hi: 50 },
  ],
};

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS & MAPPING
// ═══════════════════════════════════════════════════════════════════
const QWERTY_MAP = {
  // Lower Octave
  'z': 55, 's': 56, 'x': 57, 'd': 58, 'c': 59, 'v': 60, 'g': 61, 'b': 62, 'h': 63, 'n': 64, 'm': 65, 'k': 66,
  // Upper Octave
  'q': 67, '2': 68, 'w': 69, '3': 70, 'e': 71, 'r': 72, '5': 73, 't': 74, '6': 75, 'y': 76, 'u': 77, '8': 78, 'i': 79, '9': 80, 'o': 81, '0': 82, 'p': 83
};

// Reverse map for printing labels on keys
const MIDI_TO_KEY = {};
for (let [key, midi] of Object.entries(QWERTY_MAP)) {
  MIDI_TO_KEY[midi] = key.toUpperCase();
}

// ═══════════════════════════════════════════════════════════════════
// VOICE DEFINITIONS
// ═══════════════════════════════════════════════════════════════════
const VOICE_NAMES = ['PIANO', 'FANTASY', 'VIOLIN', 'FLUTE', 'GUITAR'];
const LCD_NAMES   = ['PIANO', 'FNTASY', 'VIOLIN', 'FLUTE', 'GUITAR'];
const defaultBanks = [
  'Piano (Acoustic)',
  'Fantasy',
  'Violin',
  'Flute',
  'Guitar (Acoustic)',
];

const voiceBankAssignment = [...defaultBanks];

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let currentVoice = 0;
let octaveOffset = 0; // -1, 0, +1
let masterVolume = 0.8;
let audioStarted = false;

const samplerCache = {};
const activeNotes = {}; // midi -> { sampler, toneNote }

// ═══════════════════════════════════════════════════════════════════
// MIDI / TONE UTILITIES
// ═══════════════════════════════════════════════════════════════════
const MIDI_NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function midiToTone(midi) {
  const oct = Math.floor(midi / 12) - 1;
  const name = MIDI_NOTE_NAMES[midi % 12];
  return name + oct;
}

function findSample(bank, midi) {
  const samples = SAMPLE_BANKS[bank];
  let match = samples.find(s => midi >= s.lo && midi <= s.hi);
  if (match) return match;
  let best = samples[0];
  let bestDist = Math.abs(samples[0].root - midi);
  for (const s of samples) {
    const d = Math.abs(s.root - midi);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return best;
}

function buildSamplerUrls(bank) {
  const samples = SAMPLE_BANKS[bank];
  const urls = {};
  for (const s of samples) {
    urls[midiToTone(s.root)] = s.path;
  }
  return urls;
}

function getSampler(bankName) {
  if (samplerCache[bankName]) return samplerCache[bankName];
  const urls = buildSamplerUrls(bankName);
  const vol = new Tone.Volume(Tone.gainToDb(masterVolume)).toDestination();
  const sampler = new Tone.Sampler({
    urls,
    baseUrl: './',
    release: 0.5,
  }).connect(vol);
  samplerCache[bankName] = { sampler, vol };
  return samplerCache[bankName];
}

function setMasterVolume(v) {
  masterVolume = v;
  const db = Tone.gainToDb(Math.max(0.001, v));
  for (const key of Object.keys(samplerCache)) {
    samplerCache[key].vol.volume.value = db;
  }
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD LAYOUT (Updated to start at G3)
// ═══════════════════════════════════════════════════════════════════
const WHITE_KEY_NOTES = [
  // G3 group
  { midi: 55 }, { midi: 57 }, { midi: 59 },
  // C4 group
  { midi: 60 }, { midi: 62 }, { midi: 64 }, { midi: 65 }, { midi: 67 }, { midi: 69 }, { midi: 71 },
  // C5 group
  { midi: 72 }, { midi: 74 }, { midi: 76 }, { midi: 77 }, { midi: 79 }, { midi: 81 }, { midi: 83 },
];

const BLACK_KEY_DEFS = [];
for (let i = 0; i < WHITE_KEY_NOTES.length - 1; i++) {
  const curr = WHITE_KEY_NOTES[i].midi;
  const next = WHITE_KEY_NOTES[i + 1].midi;
  if (next - curr === 2) {
    // There is a black key on the boundary right after white key `i`
    BLACK_KEY_DEFS.push({ midi: curr + 1, boundaryIdx: i + 1 });
  }
}

// ═══════════════════════════════════════════════════════════════════
// BUILD KEYBOARD DOM
// ═══════════════════════════════════════════════════════════════════
const whiteKeysEl = document.getElementById('whiteKeys');
const blackKeysEl = document.getElementById('blackKeys');

WHITE_KEY_NOTES.forEach((n, i) => {
  const div = document.createElement('div');
  div.className = 'wkey';
  div.dataset.midi = n.midi;
  div.dataset.idx = i;
  
  if (MIDI_TO_KEY[n.midi]) {
    const lbl = document.createElement('span');
    lbl.className = 'note-label';
    lbl.textContent = MIDI_TO_KEY[n.midi];
    div.appendChild(lbl);
  }
  
  whiteKeysEl.appendChild(div);
});

const N_WHITE = WHITE_KEY_NOTES.length; // 17
BLACK_KEY_DEFS.forEach(b => {
  const div = document.createElement('div');
  div.className = 'bkey';
  div.dataset.midi = b.midi;
  
  // Calculate position precisely on the boundary line between the white keys
  const boundaryPct = (b.boundaryIdx / N_WHITE) * 100;
  const bkeyWidthPct = 60 / N_WHITE; // Scales black key width relative to white keys
  
  div.style.left = `calc(${boundaryPct}% - ${bkeyWidthPct / 2}%)`;
  div.style.width = `${bkeyWidthPct}%`;

  if (MIDI_TO_KEY[b.midi]) {
    const lbl = document.createElement('span');
    lbl.className = 'note-label';
    lbl.textContent = MIDI_TO_KEY[b.midi];
    div.appendChild(lbl);
  }

  blackKeysEl.appendChild(div);
});

// ═══════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════════
async function startAudio() {
  if (!audioStarted) {
    await Tone.start();
    audioStarted = true;
  }
}

function getCurrentBank() {
  return voiceBankAssignment[currentVoice];
}

function noteOn(rawMidi) {
  const midi = rawMidi + octaveOffset * 12;
  const bank = getCurrentBank();
  const { sampler } = getSampler(bank);
  const toneNote = midiToTone(midi);
  if (activeNotes[rawMidi]) {
    try { activeNotes[rawMidi].sampler.triggerRelease(activeNotes[rawMidi].toneNote, Tone.now()); } catch(e) {}
  }
  sampler.triggerAttack(toneNote, Tone.now());
  activeNotes[rawMidi] = { sampler, toneNote };
}

function noteOff(rawMidi) {
  if (activeNotes[rawMidi]) {
    try {
      activeNotes[rawMidi].sampler.triggerRelease(activeNotes[rawMidi].toneNote, Tone.now() + 0.05);
    } catch(e) {}
    delete activeNotes[rawMidi];
  }
}

// ═══════════════════════════════════════════════════════════════════
// KEY EVENTS (mouse + touch)
// ═══════════════════════════════════════════════════════════════════
function attachKeyEvents(el) {
  const midi = parseInt(el.dataset.midi);

  const onStart = async (e) => {
    e.preventDefault();
    await startAudio();
    el.classList.add('pressed');
    noteOn(midi);
  };
  const onEnd = (e) => {
    e.preventDefault();
    el.classList.remove('pressed');
    noteOff(midi);
  };

  el.addEventListener('mousedown', onStart);
  el.addEventListener('mouseup', onEnd);
  el.addEventListener('mouseleave', onEnd);
  el.addEventListener('touchstart', onStart, { passive: false });
  el.addEventListener('touchend', onEnd, { passive: false });
  el.addEventListener('touchcancel', onEnd, { passive: false });
}

document.querySelectorAll('.wkey, .bkey').forEach(attachKeyEvents);

// ═══════════════════════════════════════════════════════════════════
// VOICE BUTTONS
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.voice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentVoice = parseInt(btn.dataset.voice);
    document.getElementById('lcd').textContent = LCD_NAMES[currentVoice];
    getSampler(voiceBankAssignment[currentVoice]);
  });
});

// ═══════════════════════════════════════════════════════════════════
// OCTAVE SWITCH
// ═══════════════════════════════════════════════════════════════════
const octLabels = { '-1': 'LOW', '0': 'MID', '1': 'HIGH' };
document.querySelectorAll('.oct-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    Object.keys(activeNotes).forEach(m => noteOff(parseInt(m)));
    document.querySelectorAll('.oct-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    octaveOffset = parseInt(btn.dataset.oct);
    document.getElementById('octLabel').textContent = 'OCT: ' + octLabels[btn.dataset.oct];
  });
});

// ═══════════════════════════════════════════════════════════════════
// VOLUME SLIDER
// ═══════════════════════════════════════════════════════════════════
document.getElementById('volumeSlider').addEventListener('input', e => {
  setMasterVolume(e.target.value / 100);
});

// ═══════════════════════════════════════════════════════════════════
// CONFIG PANEL — sample assignment per voice
// ═══════════════════════════════════════════════════════════════════
const configBody = document.getElementById('configBody');
const bankNames = Object.keys(SAMPLE_BANKS);

VOICE_NAMES.forEach((name, idx) => {
  const div = document.createElement('div');
  div.className = 'cfg-voice';

  const label = document.createElement('div');
  label.className = 'cfg-voice-name';
  label.textContent = name;

  const sel = document.createElement('select');
  sel.className = 'cfg-select';
  sel.id = `cfg-sel-${idx}`;

  bankNames.forEach(bn => {
    const opt = document.createElement('option');
    opt.value = bn;
    opt.textContent = bn;
    if (bn === defaultBanks[idx]) opt.selected = true;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => {
    voiceBankAssignment[idx] = sel.value;
    getSampler(sel.value);
  });

  div.appendChild(label);
  div.appendChild(sel);
  configBody.appendChild(div);
});

document.getElementById('configToggle').addEventListener('click', () => {
  const body = document.getElementById('configBody');
  const arrow = document.getElementById('configArrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
});

// ═══════════════════════════════════════════════════════════════════
// DESKTOP KEYBOARD LISTENERS
// ═══════════════════════════════════════════════════════════════════
const heldKeys = new Set();

document.addEventListener('keydown', async e => {
  if (e.repeat) return;
  const midi = QWERTY_MAP[e.key.toLowerCase()];
  if (midi == null) return;
  if (heldKeys.has(e.key)) return;
  
  heldKeys.add(e.key);
  await startAudio();
  
  const keyEl = document.querySelector(`[data-midi="${midi}"]`);
  if (keyEl) keyEl.classList.add('pressed');
  noteOn(midi);
});

document.addEventListener('keyup', e => {
  const midi = QWERTY_MAP[e.key.toLowerCase()];
  if (midi == null) return;
  
  heldKeys.delete(e.key);
  const keyEl = document.querySelector(`[data-midi="${midi}"]`);
  if (keyEl) keyEl.classList.remove('pressed');
  noteOff(midi);
});

// Pre-warm default voice
window.addEventListener('load', () => {
  // Sampler loads gracefully on init
});
  // ═══════════════════════════════════════════════════════════════════
// WEB MIDI API SUPPORT
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// WEB MIDI API SUPPORT (Streamlined)
// ═══════════════════════════════════════════════════════════════════
if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
} else {
  console.warn('Web MIDI API is not supported in this browser.');
}

function onMIDISuccess(midiAccess) {
  // Modern, foolproof loop to bind all currently connected devices
  for (let input of midiAccess.inputs.values()) {
    input.onmidimessage = handleMIDIMessage;
  }
  
  // Listen for devices plugged in after the page loads
  midiAccess.onstatechange = (e) => {
    if (e.port.type === 'input' && e.port.state === 'connected') {
      e.port.onmidimessage = handleMIDIMessage;
    }
  };
}

function onMIDIFailure() {
  console.error('Could not access your MIDI devices. Ensure you are running on localhost or HTTPS.');
}

function handleMIDIMessage(message) {
  const [command, note, velocity] = message.data;

  // Mask off the lower 4 bits (the channel) to get just the message type
  const messageType = command & 0xF0;

  // Note On (144 = 0x90)
  if (messageType === 144 && velocity > 0) {
    startAudio(); 
    noteOn(note);
    
    const keyEl = document.querySelector(`[data-midi="${note}"]`);
    if (keyEl) keyEl.classList.add('pressed');
  }
  
  // Note Off (128 = 0x80) or Note On with 0 velocity
  if (messageType === 128 || (messageType === 144 && velocity === 0)) {
    noteOff(note);
    
    const keyEl = document.querySelector(`[data-midi="${note}"]`);
    if (keyEl) keyEl.classList.remove('pressed');
  }
}
