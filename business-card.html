<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Card Print Layout</title>
    <!-- Importing your fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* --- Browser Preview & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #e0e0e0; font-family: 'Share Tech Mono', monospace; color: #000; }

        /* --- Page Dimensions (Avery Standard Letter) --- */
        .page {
            width: 8.5in;
            height: 11in;
            background: #fff;
            margin: 20px auto;
            padding: 0.5in 0.75in; /* Standard Avery margins: 0.5" top/bottom, 0.75" sides */
            display: grid;
            grid-template-columns: repeat(2, 3.5in);
            grid-template-rows: repeat(5, 2in);
            grid-gap: 0; /* Cards are flush against each other on the sheet */
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* --- Individual Card Styling --- */
        .card {
            width: 3.5in;
            height: 2in;
            outline: 1px dashed #ccc; /* Visual guide for browser preview */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.2in;
            overflow: hidden;
            background: #fff;
        }

        /* --- Front Side Specifics --- */
        .front .logo {
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            line-height: 1;
            text-align: center;
            margin-bottom: 0.1in;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        
        /* QR Container to handle central mapping context */
        .qr-container {
            position: relative;
            width: 0.95in;
            height: 0.95in;
            margin: 0 auto;
        }
        .front .qr-code {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* The central custom icon layout mask */
        .qr-center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;  /* Keeps the mask size perfectly safe under the 30% limit */
            height: 18px;
            background: #fff; /* Solid white background blocks out the grid segments below */
            border: 1.5px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif; /* Clean rendering font for geometric symbols */
            font-size: 13px;
            font-weight: bold;
            line-height: 1;
        }

        /* --- Back Side Specifics --- */
        .back {
            align-items: flex-start;
            justify-content: center;
            padding: 0.2in 0.25in;
        }
        .back .header {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            border-bottom: 1px solid #000;
            width: 100%;
            padding-bottom: 2px;
            margin-bottom: 0;
        }
        .back .links {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.67rem; 
            width: 100%;
            margin-top: 10px;
        }
        .back .link-line {
            display: flex;
            width: 100%;
        }
        .back .label {
            font-weight: bold;
            width: 78px;
            flex-shrink: 0;
        }
        .back .value {
            white-space: nowrap;
            overflow: hidden;
            text-transform: lowercase;
            letter-spacing: -0.2px;
            padding-left: 4px;
        }

        /* --- Print Optimization Layout --- */
        @media print {
            body { background: none; }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }
            .card {
                outline: none;
            }
        }
    </style>
</head>
<body>

    <!-- ================= PAGE 1: FRONTS ================= -->
    <div class="page">
        <script>
            for(let i=0; i<10; i++) {
                document.write(`
                    <div class="card front">
                        <div class="logo">Carl-William-Music</div>
                        <div class="qr-container">
                            <img src="qr-code.svg" class="qr-code" alt="QR Code" />
                            <!-- Unified center icon: Choose '♫' or '🎸' below -->
                            <div class="qr-center-icon">♫</div>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

    <!-- ================= PAGE 2: BACKS ================= -->
    <div class="page">
        <script>
            for(let i=0; i<10; i++) {
                document.write(`
                    <div class="card back">
                        <div class="header">// CONTACT_INFO</div>
                        <div class="links">
                            <div class="link-line"><span class="label">WEBSITE:</span><span class="value">ahlers94.github.io/carl-william-music/</span></div>
                            <div class="link-line"><span class="label">E-MAIL:</span><span class="value">wcarlahlers@gmail.com</span></div>
                            <div class="link-line"><span class="label">YOUTUBE:</span><span class="value">@CarlWilliamMusic</span></div>
                            <div class="link-line"><span class="label">INSTAGRAM:</span><span class="value">@carlwilliammusic</span></div>
                            <div class="link-line"><span class="label">GITHUB:</span><span class="value">github.com/Ahlers94</span></div>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

</body>
</html>
